name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove Gitleaks report artifact
        run: rm -f results.sarif
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - name: Static check for unsafe logging patterns
        run: node scripts/check-unsafe-logging.mjs
      - name: Seed roadmap labels
        if: ${{ github.event_name == 'push' }}
        run: bash scripts/seed-labels.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      - run: npm test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Live Monobank adapter smoke
        if: ${{ github.event_name == 'push' }}
        run: npm run test:live-monobank
        env:
          MONO_LEDGER_SYNC_LIVE_MONOBANK_TESTS: "1"
          MONOBANK_TOKEN: ${{ secrets.MONOBANK_TOKEN }}
      - run: npm run coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run format
