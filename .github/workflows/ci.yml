name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove Gitleaks report artifact
        run: rm -f results.sarif
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Static check for repository secrets
        run: npm run scan:secrets
      - run: npm audit --omit=dev --audit-level=high
      - name: Static check for unsafe logging patterns
        run: node scripts/check-unsafe-logging.mjs
      - name: Seed roadmap labels
        # The default GITHUB_TOKEN on `push` events is read-only for issues/labels,
        # which makes this step 403. The labels were seeded once in #456 and the
        # one-shot chore is complete; keep this as a best-effort re-sync rather
        # than a hard CI gate. Rerun manually from the Actions tab if labels drift.
        if: ${{ github.event_name == 'push' }}
        continue-on-error: true
        run: bash scripts/seed-labels.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      - run: npm test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install browser smoke dependencies
        run: npx playwright install --with-deps chromium
      - run: npm run smoke:web
      - name: Live Monobank adapter smoke
        if: ${{ github.event_name == 'push' }}
        run: npm run test:live-monobank
        env:
          MONO_LEDGER_SYNC_LIVE_MONOBANK_TESTS: "1"
          MONOBANK_TOKEN: ${{ secrets.MONOBANK_TOKEN }}
      - run: npm run coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run format
