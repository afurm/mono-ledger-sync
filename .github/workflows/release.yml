name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version" >&2
            exit 1
          fi

      - name: Verify package version is not already published
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if npm view "mono-ledger-sync@$package_version" version >/dev/null 2>&1; then
            echo "mono-ledger-sync@$package_version is already published" >&2
            exit 1
          fi

      - run: npm ci
      - name: Static check for repository secrets
        run: npm run scan:secrets
      - run: npm run typecheck
      - run: npm test
      - name: Install browser smoke dependencies
        run: npx playwright install --with-deps chromium
      - run: npm run smoke:web
      - run: npm run format
      - name: npm publish dry-run (validates the manifest and tarball without publishing)
        run: npm publish --dry-run
      - run: npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --target "$GITHUB_SHA" \
            --title "mono-ledger-sync $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
